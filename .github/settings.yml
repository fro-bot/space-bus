---
_extends: .github:common-settings.yaml

repository:
  name: space-bus
  description: Space Bus — workspace agent bus for OpenCode. One control agent tasking per-project agents over the OpenCode server API, with an MCP facade for Claude Desktop.
  homepage: https://www.npmjs.com/package/@fro.bot/space-bus
  topics: opencode, plugin, mcp, agent-orchestration, bun, typescript
  allow_merge_commit: true
  allow_squash_merge: true
  allow_rebase_merge: false
  delete_branch_on_merge: true

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - Check
          - Fro Bot
          - Renovate / Renovate
      enforce_admins: true
      required_linear_history: true
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        require_last_push_approval: true
      restrictions: null
