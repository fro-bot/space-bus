---
_extends: .github:common-settings.yaml

repository:
  name: space-bus
  description: Fro Bot Space Bus — workspace agent bus for OpenCode. One control agent tasking per-project agents over the OpenCode server API, with an MCP facade for Claude Desktop.
  homepage: https://www.npmjs.com/package/@fro.bot/space-bus
  topics: opencode, plugin, mcp, agent-orchestration, bun, typescript

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - Fro Bot
          - Lint, typecheck, build, unit tests
          - Renovate / Renovate
      enforce_admins: true
      required_pull_request_reviews: null
      restrictions: null
      required_linear_history: true
